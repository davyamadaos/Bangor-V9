<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bangor Water Level</title>
<link rel="stylesheet" href="css/app.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header class="header">
  <h1>Bangor Water Level</h1>
  <p id="updated">Loading...</p>
</header>

<section class="cards">
  <div class="card primary">
    <div class="label">Current Level</div>
    <div id="level" class="value">--</div>
  </div>

  <div class="card">
    <div class="label">Gauge</div>
    <div id="gauge" class="value">--</div>
  </div>

  <div class="card">
    <div class="label">Trend</div>
    <div id="trend" class="value">--</div>
  </div>
</section>

<section class="epa-image">
  <img src="https://epawebapp.epa.ie/Hydronet/output/internet/stations/CAS/33008/S/extralarge_3m_extralarge.png" />
</section>

<section class="filters">
  <button data-range="6">6h</button>
  <button data-range="12">12h</button>
  <button data-range="24">24h</button>
  <button data-range="48">48h</button>
  <button data-range="168">7d</button>
  <button data-range="504">3wk</button>
</section>

<section class="chart">
  <canvas id="riverChart"></canvas>
</section>

<script src="js/app.js"></script>
<script src="js/chart.js"></script>

</body>
</html>
