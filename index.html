<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bangor Water Level</title>
<link rel="stylesheet" href="css/app.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

</head>
<body>

<header>
<h1>Bangor Water Level</h1>
<p id="updated">Loading...</p>
</header>

<section class="cards">
<div class="card"><h2>Current Level</h2><div id="level">--</div></div>
<div class="card"><h2>Gauge</h2><div id="gauge">--</div></div>
<div class="card"><h2>Trend</h2><div id="trend">--</div></div>
</section>

<section class="filters">
<button onclick="setRange('6h')">6h</button>
<button onclick="setRange('12h')">12h</button>
<button onclick="setRange('24h')">24h</button>
<button onclick="setRange('48h')">48h</button>
<button onclick="setRange('7d')">7d</button>
<button onclick="setRange('3wk')">3wk</button>
</section>

<section class="chart">
<canvas id="riverChart"></canvas>
</section>

<script src="js/app.js"></script>

</body>
</html>
