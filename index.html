<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bangor Water Level</title>
<link rel="stylesheet" href="css/app.css" />

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

</head>

<body class="fishing-mode">

<header class="top">
  <div class="title">Bangor Water Level</div>
  <div id="updated" class="updated">Loading...</div>
</header>

<section class="hero">
  <div class="big-level" id="level">--</div>
  <div class="sub-row">
    <div class="badge" id="trend">--</div>
    <div class="badge" id="gauge">--</div>
  </div>
</section>

<section class="epa">
  <img src="https://epawebapp.epa.ie/Hydronet/output/internet/stations/CAS/33008/S/extralarge_3m_extralarge.png" alt="EPA Chart" />
</section>

<section class="filters">
  <button onclick="setRange('6h')">6h</button>
  <button onclick="setRange('12h')">12h</button>
  <button onclick="setRange('24h')">24h</button>
  <button onclick="setRange('48h')">48h</button>
  <button onclick="setRange('7d')">7d</button>
  <button onclick="setRange('3wk')">3wk</button>
</section>

<section class="chart">
  <canvas id="riverChart"></canvas>
</section>

<script src="js/app.js"></script>

</body>
</html>
